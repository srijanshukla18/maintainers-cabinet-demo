name: Bug Report
description: Report a bug in cabinet-demo
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. 2.1.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "e.g. macOS 14, Node 20"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
